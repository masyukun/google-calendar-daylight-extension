<!doctype html>
<html>
  <head>
      <title>Google Calendar Daylight</title>
      <script type="text/javascript" src="popup.js"></script>
      <link rel="stylesheet" type="text/css" href="popup.css"/>
  </head>
  <body>
    <span id="header">
      <img src="icon48.png" width="32" height="32" />
      <span class="daylightTitle">Daylight</span>
    </span>
    
      <table id="options" width="100%">
        <tr>
            <td> &nbsp; </td>
            <td align="right">v 1.1.0</td>
        </tr>
<!--
        <tr>
            <td><b>Location</b></td>
            <td><input id="geoControl" type="text" value="N/A" ></input></td>
        </tr>
        <tr>
            <td><b>Opacity</b></td>
            <td><input id="opacityControl" type="range" min="0.1" max="1.0" step="0.05" value="0.5"></input></td>
        </tr>
        <tr>
            <td></td>
            <td><button id="clickMe">Apply</button></td>
        </tr>
-->
        <tr>
            <td colspan="2" style="text-align: center;"><p></p><a href="https://calendar.google.com/calendar" target="_blank" rel="noopener noreferrer">Open Google Calendar</a></td>
        </tr>
        <tr>
          <td colspan="2"><hr></td>
        </tr>
        <tr>
          <td><b>Daylight</b></td>
          <td align="right"><input id="daylightColor" type="color"></td>
        </tr>
        <tr>
          <td><b>Astronomical twilight</b></td>
          <td align="right"><input id="astronomicalTwilightColor" type="color"></td>
        </tr>
        <tr>
          <td><b>Nautical twilight</b></td>
          <td align="right"><input id="nauticalTwilightColor" type="color"></td>
        </tr>
        <tr>
          <td><b>Civil twilight</b></td>
          <td align="right"><input id="civilTwilightColor" type="color"></td>
        </tr>
        <tr>
          <td><b>Sunrise/Sunset</b></td>
          <td align="right"><input id="sunriseSunsetColor" type="color"></td>
        </tr>
        <tr>
          <td><b>Golden hour</b></td>
          <td align="right"><input id="goldenHourColor" type="color"></td>
        </tr>
        <tr>
          <td colspan="2" style="text-align:center; padding-top: 8px;">
            <button id="saveColors">Save Colors</button>
            <button id="resetColors">Reset</button>
          </td>
        </tr>
        <tr>
          <td colspan="2" style="text-align:center;"><span id="saveStatus"></span></td>
        </tr>
      </table>
      
  </body>
</html>
